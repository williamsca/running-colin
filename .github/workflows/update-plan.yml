name: Update training plan page

on:
  schedule:
    # ~Sunday 10pm America/New_York; drifts by an hour across DST
    - cron: "0 2 * * 1"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "build.py"
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build site
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/index.html; then
            echo "No changes to publish."
            exit 0
          fi
          git add docs/index.html
          git commit -m "Update training plan page for the upcoming week"
          git push
